services:
  solana-agent:
    build:
      context: ../..
      dockerfile: agents/solana/Dockerfile
    ports:
      - "${AM_PORT:-9002}:9002"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
