name: agentscan-agent

services:
  agentscan-agent:
    build:
      context: ../..
      dockerfile: agents/agentscan/Dockerfile
    ports:
      - "${AM_PORT:-9010}:9010"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9010/health"]
      interval: 30s
      timeout: 5s
      retries: 3
