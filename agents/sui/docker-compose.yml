services:
  sui-agent:
    build:
      context: ../..
      dockerfile: agents/sui/Dockerfile
    ports:
      - "${AM_PORT:-9003}:9003"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9003/health"]
      interval: 30s
      timeout: 5s
      retries: 3
