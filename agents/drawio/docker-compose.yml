services:
  drawio-agent:
    build:
      context: ../..
      dockerfile: agents/drawio/Dockerfile
    ports:
      - "${AM_PORT:-9001}:9001"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
